<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi Particle Controller</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f2ff;
            z-index: 100;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .data-box {
            border: 1px solid #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 220px;
            border: 1px solid #00f2ff;
            border-radius: 4px;
            transform: scaleX(-1);
            z-index: 2;
            opacity: 0.6;
        }

        .highlight {
            color: #fff;
            text-shadow: 0 0 5px #00f2ff;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div class="data-box">
            <div>SYSTEM: <span class="highlight">ACTIVE</span></div>
            <div>TRACKING: <span id="status" class="highlight">SCANNING...</span></div>
        </div>
        <div class="data-box">
            <div>GESTURE: <span id="gesture" class="highlight">NONE</span></div>
            <div>TEMPLATE: <span id="template" class="highlight">CLOUD</span></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const PARTICLE_COUNT = 15000;
        let isBursting = false;

        // --- SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        camera.position.z = 30;

        // --- PARTICLES ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const i3 = i * 3;
            positions[i3] = (Math.random() - 0.5) * 50;
            positions[i3 + 1] = (Math.random() - 0.5) * 50;
            positions[i3 + 2] = (Math.random() - 0.5) * 50;
            colors[i3] = 0; colors[i3 + 1] = 0.8; colors[i3 + 2] = 1;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.7,
            depthWrite: false
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // --- SHAPE GENERATOR ---
        const morphTo = (type) => {
            document.getElementById('template').innerText = type;
            isBursting = false;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                let x, y, z;
                if (type === 'HEART') {
                    const t = Math.random() * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                    z = (Math.random() - 0.5) * 4;
                    targetPositions.set([x * 0.7, y * 0.7, z * 0.7], i3);
                } else if (type === 'SATURN') {
                    if (i < PARTICLE_COUNT * 0.3) {
                        const r = 6;
                        const phi = Math.random() * Math.PI * 2;
                        const theta = Math.acos((Math.random() * 2) - 1);
                        targetPositions.set([r * Math.sin(theta) * Math.cos(phi), r * Math.sin(theta) * Math.sin(phi), r * Math.cos(theta)], i3);
                    } else {
                        const r = 9 + Math.random() * 6;
                        const a = Math.random() * Math.PI * 2;
                        targetPositions.set([Math.cos(a) * r, (Math.random() - 0.5) * 0.4, Math.sin(a) * r], i3);
                    }
                } else if (type === 'FIREWORK') {
                    isBursting = true;
                    const r = 0.5 + Math.random() * 1.5;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    velocities[i3] = Math.sin(phi) * Math.cos(theta) * r;
                    velocities[i3 + 1] = Math.sin(phi) * Math.sin(theta) * r;
                    velocities[i3 + 2] = Math.cos(phi) * r;
                } else {
                    targetPositions.set([(Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30], i3);
                }
            }
        };

        // --- HANDS TRACKING ---
        const videoElement = document.createElement('video');
        document.body.appendChild(videoElement);

        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((res) => {
            const status = document.getElementById('status');
            const gestureUI = document.getElementById('gesture');

            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                status.innerText = "LOCKED";
                const lm = res.multiHandLandmarks[0];
                const indexTip = lm[8];
                const thumbTip = lm[4];
                const middleTip = lm[12];

                // Follow Hand
                const hX = (indexTip.x - 0.5) * -50;
                const hY = (indexTip.y - 0.5) * -40;
                points.position.lerp(new THREE.Vector3(hX, hY, 0), 0.15);

                // Gesture Logic
                const pinchDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                const openDist = Math.hypot(indexTip.x - lm[0].x, indexTip.y - lm[0].y); // Distance from wrist to index

                if (pinchDist < 0.04) {
                    gestureUI.innerText = "PINCH";
                    morphTo('FIREWORK');
                } else if (openDist < 0.25) {
                    gestureUI.innerText = "FIST";
                    morphTo('HEART');
                } else {
                    gestureUI.innerText = "OPEN PALM";
                    morphTo('SATURN');
                }

                material.color.setHSL(indexTip.x, 0.9, 0.6);
            } else {
                status.innerText = "LOST";
                gestureUI.innerText = "NONE";
            }
        });

        const cameraPipe = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 1280, height: 720
        });
        cameraPipe.start();

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            const pos = geometry.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                if (isBursting) {
                    pos[i3] += velocities[i3];
                    pos[i3 + 1] += velocities[i3 + 1];
                    pos[i3 + 2] += velocities[i3 + 2];
                    velocities[i3] *= 0.97; velocities[i3 + 1] *= 0.97; velocities[i3 + 2] *= 0.97;
                } else {
                    pos[i3] += (targetPositions[i3] - pos[i3]) * 0.1;
                    pos[i3 + 1] += (targetPositions[i3 + 1] - pos[i3 + 1]) * 0.1;
                    pos[i3 + 2] += (targetPositions[i3 + 2] - pos[i3 + 2]) * 0.1;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        animate();
        morphTo('CLOUD');

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>

</html>
