<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Particles</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        video {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 200px;
            border: 2px solid #555;
            border-radius: 10px;
            transform: scaleX(-1);
            z-index: 1;
        }

        .hint {
            font-size: 0.8em;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div id="ui">
        <h1>Particle Morph</h1>
        <p id="status">Status: Waiting for Camera...</p>
        <p class="hint">Top: Heart | Middle: Cloud | Bottom: Saturn</p>
        <p class="hint"><strong>Pinch Fingers (Close) to Firework Burst!</strong></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const PARTICLE_COUNT = 10000;
        let currentTemplate = 'cloud';
        let isBursting = false;

        // --- SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        camera.position.z = 20;

        // --- PARTICLES ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
            colors[i * 3] = Math.random();
            colors[i * 3 + 1] = Math.random();
            colors[i * 3 + 2] = 1.0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8,
            depthWrite: false
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // --- TEMPLATES ---
        const setTemplate = (type) => {
            currentTemplate = type;
            isBursting = false;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                let x, y, z;

                if (type === 'heart') {
                    const t = Math.random() * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                    z = (Math.random() - 0.5) * 5;
                    targetPositions.set([x * 0.4, y * 0.4, z * 0.4], i3);
                } else if (type === 'saturn') {
                    if (i < PARTICLE_COUNT * 0.5) {
                        const u = Math.random(); const v = Math.random();
                        const theta = 2 * Math.PI * u;
                        const phi = Math.acos(2 * v - 1);
                        targetPositions.set([5 * Math.sin(phi) * Math.cos(theta), 5 * Math.sin(phi) * Math.sin(theta), 5 * Math.cos(phi)], i3);
                    } else {
                        const r = 7 + Math.random() * 3;
                        const a = Math.random() * Math.PI * 2;
                        targetPositions.set([Math.cos(a) * r, (Math.random() - 0.5), Math.sin(a) * r], i3);
                    }
                } else if (type === 'firework') {
                    isBursting = true;
                    const phi = Math.random() * Math.PI * 2;
                    const theta = Math.random() * Math.PI;
                    const force = 0.5 + Math.random() * 0.5;
                    velocities[i3] = Math.sin(theta) * Math.cos(phi) * force;
                    velocities[i3 + 1] = Math.sin(theta) * Math.sin(phi) * force;
                    velocities[i3 + 2] = Math.cos(theta) * force;
                } else {
                    targetPositions.set([(Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20], i3);
                }
            }
        };

        // --- TRACKING ---
        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        hands.onResults((res) => {
            const status = document.getElementById('status');
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                status.innerText = "Status: Hand Detected";
                const lm = res.multiHandLandmarks[0];
                const indexTip = lm[8];
                const thumbTip = lm[4];

                // Screen mapping
                const targetX = (indexTip.x - 0.5) * -40;
                const targetY = (indexTip.y - 0.5) * -30;
                points.position.lerp(new THREE.Vector3(targetX, targetY, 0), 0.1);

                // Gesture: Burst (Pinch)
                const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                if (dist < 0.05 && !isBursting) {
                    setTemplate('firework');
                    material.color.setHex(0xffffff);
                } else if (dist > 0.1) {
                    material.color.setHSL(indexTip.x, 0.8, 0.6);
                    if (indexTip.y < 0.3) setTemplate('heart');
                    else if (indexTip.y > 0.7) setTemplate('saturn');
                    else if (!isBursting) setTemplate('cloud');
                }
            } else {
                status.innerText = "Status: Looking for hand...";
            }
        });

        const videoElement = document.createElement('video');
        const cameraPipe = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cameraPipe.start();
        document.body.appendChild(videoElement);

        // --- LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const pos = geometry.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                if (isBursting) {
                    pos[i3] += velocities[i3];
                    pos[i3 + 1] += velocities[i3 + 1];
                    pos[i3 + 2] += velocities[i3 + 2];
                    velocities[i3] *= 0.96; // Friction
                    velocities[i3 + 1] *= 0.96;
                    velocities[i3 + 2] *= 0.96;
                } else {
                    pos[i3] += (targetPositions[i3] - pos[i3]) * 0.05;
                    pos[i3 + 1] += (targetPositions[i3 + 1] - pos[i3 + 1]) * 0.05;
                    pos[i3 + 2] += (targetPositions[i3 + 2] - pos[i3 + 2]) * 0.05;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
